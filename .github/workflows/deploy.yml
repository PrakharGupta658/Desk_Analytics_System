name: CI/CD — Desk Occupancy System

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/desk-analytics

jobs:

  # ── Job 1: Test Backend ──────────────────────────────────────
  test-backend:
    name: Test Backend (Java)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile backend
        working-directory: ./backend
        run: mvn compile -q --batch-mode

  # ── Job 2: Test Frontend ─────────────────────────────────────
  test-frontend:
    name: Test Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./my-mca-project
        run: npm install --silent

      - name: Build React app
        working-directory: ./my-mca-project
        run: DISABLE_ESLINT_PLUGIN=true CI=false npm run build

  # ── Job 3: Test ML Service ───────────────────────────────────
  test-ml-service:
    name: Test ML Service (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./ml-service
        run: pip install -r requirements.txt

      - name: Verify ML service
        working-directory: ./ml-service
        run: python -c "from train_model import FEATURES; print('OK:', FEATURES)"

  # ── Job 4: Build & Push Images ───────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [ test-backend, test-frontend, test-ml-service ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./my-mca-project
          file: ./docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}

      - name: Build & push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}

      - name: Build & push ML Service
        uses: docker/build-push-action@v5
        with:
          context: ./ml-service
          file: ./docker/Dockerfile.mlservice
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-ml:latest
            ${{ env.IMAGE_PREFIX }}-ml:${{ github.sha }}

      - name: Confirm images pushed
        run: |
          echo "✅ Images pushed to Docker Hub:"
          echo "   ${{ env.IMAGE_PREFIX }}-frontend:latest"
          echo "   ${{ env.IMAGE_PREFIX }}-backend:latest"
          echo "   ${{ env.IMAGE_PREFIX }}-ml:latest"

  # ── Job 5: Deploy to Server ──────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker/docker-compose.prod.yml"
          target: "~/desk-analytics/"
          strip_components: 1

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            echo "=== Starting deployment ==="
            cd ~/desk-analytics

            echo "=== Writing .env file ==="
            cat > .env << ENVEOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            IMAGE_TAG=${{ github.sha }}
            ENVEOF

            echo "=== Logging into Docker Hub ==="
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "=== Pulling latest images ==="
            docker compose -f docker-compose.prod.yml pull

            echo "=== Starting containers ==="
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "=== Running containers ==="
            docker compose -f docker-compose.prod.yml ps

            echo "=== Deployment complete! ==="

      - name: Deployment summary
        if: success()
        run: |
          echo "✅ Deployed to EC2: ${{ secrets.SERVER_HOST }}"
          echo "🔗 Dashboard: http://${{ secrets.SERVER_HOST }}:3000"
          echo "📦 Commit: ${{ github.sha }}"
          echo "👤 Deployed by: ${{ github.actor }}"
