# docker-compose.prod.yml
# Used on the Linux server — pulls pre-built images from Docker Hub
# instead of building from source.
# IMAGE_TAG and DOCKERHUB_USERNAME come from the .env file written by GitHub Actions.

services:

  postgres:
    image: postgres:16-alpine
    container_name: desk_postgres
    restart: always
    environment:
      POSTGRES_DB:       desk_analytics
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Not exposed publicly — only accessible inside Docker network
    expose:
      - "5432"

  backend:
    image: ${DOCKERHUB_USERNAME}/desk-analytics-backend:${IMAGE_TAG:-latest}
    container_name: desk_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL:                       jdbc:postgresql://postgres:5432/desk_analytics
      DB_USER:                      postgres
      DB_PASSWORD:                  ${DB_PASSWORD}
      SENSOR_API_BASE_URL:          https://flask.claircoair.com/api/v1/desktherm-realtime
      SENSOR_IDS:                   2c:cf:67:ff:f5:f4
      SENSOR_POLL_INTERVAL_SECONDS: 30
      SERVER_PORT:                  8080
      SERVER_CORS_ORIGIN:           http://localhost:3000
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/occupancy/live?sensorId=2c:cf:67:ff:f5:f4 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  ml-service:
    image: ${DOCKERHUB_USERNAME}/desk-analytics-ml:${IMAGE_TAG:-latest}
    container_name: desk_ml
    restart: always
    environment:
      ML_PORT: 5001
    ports:
      - "5001:5001"
    volumes:
      - ml_models:/app/models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5001/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: ${DOCKERHUB_USERNAME}/desk-analytics-frontend:${IMAGE_TAG:-latest}
    container_name: desk_frontend
    restart: always
    depends_on:
      - backend
      - ml-service
    ports:
      - "3000:80"

volumes:
  postgres_data:
  ml_models:
