# ─────────────────────────────────────────────────────────────
# Smart Desk Occupancy Monitoring & Analytics System
# Services:
#   postgres   — database (port 5432)
#   backend    — Java REST API (port 8080)
#   ml-service — Python prediction API (port 5001)
#   frontend   — React app via Nginx (port 3000)
# ─────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: desk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       desk_analytics
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}   # override via .env
    volumes:
      - postgres_data:/var/lib/postgresql/data      # data persists across restarts
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Java Backend ────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: desk_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy       # wait for Postgres to be ready
    environment:
      # These override values in config.properties at runtime
      DB_URL:                    jdbc:postgresql://postgres:5432/desk_analytics
      DB_USER:                   postgres
      DB_PASSWORD:               ${DB_PASSWORD:-postgres}
      SENSOR_API_BASE_URL:       https://flask.claircoair.com/api/v1/desktherm-realtime
      SENSOR_IDS:                2c:cf:67:ff:f5:f4
      SENSOR_POLL_INTERVAL_SECONDS: 30
      SERVER_PORT:               8080
      SERVER_CORS_ORIGIN:        http://localhost:3000
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/occupancy/live?sensorId=2c:cf:67:ff:f5:f4 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Python ML Service ───────────────────────────────────────
  ml-service:
    build:
      context: ../ml-service
      dockerfile: ../docker/Dockerfile.mlservice
    container_name: desk_ml
    restart: unless-stopped
    environment:
      ML_PORT: 5001
    ports:
      - "5001:5001"
    volumes:
      # Mount model file as a volume so you can retrain without rebuilding image
      - ml_models:/app/models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5001/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── React Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ../my-mca-project
      dockerfile: ../docker/Dockerfile.frontend
    container_name: desk_frontend
    restart: unless-stopped
    depends_on:
      - backend
      - ml-service
    ports:
      - "3000:80"        # React served on 3000 externally, Nginx listens on 80 inside
    environment:
      REACT_APP_BACKEND_URL:    http://localhost:8080
      REACT_APP_ML_SERVICE_URL: http://localhost:5001

# ── Named volumes ───────────────────────────────────────────
volumes:
  postgres_data:    # Postgres data directory
  ml_models:        # ML model .pkl files
